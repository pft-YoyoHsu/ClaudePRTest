name: Claude Auto PR Review

on:
  pull_request_target:
    types: [opened]
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]
  pull_request_review:
    types: [submitted]

jobs:
  claude:
    if: |
      (github.event_name == 'pull_request_target') ||
      (github.event_name == 'issue_comment' && github.event.issue.pull_request && contains(github.event.comment.body, '@claude')) ||
      (github.event_name == 'pull_request_review_comment' && contains(github.event.comment.body, '@claude')) ||
      (github.event_name == 'pull_request_review' && contains(github.event.review.body, '@claude'))
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: write
      issues: write
      pull-requests: write
      id-token: write
    steps:
      - name: Resolve PR context
        id: pr-context
        uses: actions/github-script@v7
        with:
          script: |
            let prNumber = '';

            if (context.payload.pull_request?.number) {
              prNumber = String(context.payload.pull_request.number);
            } else if (context.payload.issue?.pull_request && context.payload.issue?.number) {
              prNumber = String(context.payload.issue.number);
            }

            if (!prNumber) {
              core.setFailed(`No PR context found for event: ${context.eventName}`);
              return;
            }

            const { data: pr } = await github.rest.pulls.get({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: Number(prNumber),
            });

            core.setOutput('pr_number', prNumber);
            core.setOutput('pr_title', pr.title || '');
            core.setOutput('base_sha', pr.base.sha);

      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: ${{ steps.pr-context.outputs.base_sha }}
          fetch-depth: 1

      - name: Validate Claude API key
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          if [ -z "${ANTHROPIC_API_KEY}" ]; then
            echo "::error::Missing ANTHROPIC_API_KEY. Claude SDK cannot request tokens."
            exit 1
          fi
          case "${ANTHROPIC_API_KEY}" in
            sk-ant-*) ;;
            *)
              echo "::warning::ANTHROPIC_API_KEY does not match expected prefix 'sk-ant-'."
              ;;
          esac

      - name: PR Review with Progress Tracking
        uses: anthropics/claude-code-action@v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          track_progress: true
          github_token: ${{ secrets.GITHUB_TOKEN }}
          prompt: |
            PR NUMBER: ${{ steps.pr-context.outputs.pr_number }}
            PR TITLE: ${{ steps.pr-context.outputs.pr_title }}
            Review this PR
          claude_args: |
            --allowedTools "Read,Glob,Grep,LS,Bash(gh pr diff:*),Bash(gh pr view:*),Bash(gh pr checks:*),Bash(cat:*),Bash(git diff:*),Bash(git log:*),Bash(git show:*),Bash(wc:*),Bash(head:*),Bash(tail:*)"
            
